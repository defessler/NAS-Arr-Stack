services:

  # ── Media Server ──────────────────────────────────────────

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    networks: [media]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    ports:
      - ${LAN_IP}:32400:32400
    volumes:
      - /volume1/docker/media/plex/config:/config
      - /volume1/Data/Media:/media
    # Uncomment for Intel Arc GPU transcoding later:
    # devices:
    #   - /dev/dri:/dev/dri
    restart: unless-stopped

  tautulli:
    image: linuxserver/tautulli:latest
    container_name: tautulli
    networks: [media]
    depends_on: [plex]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:8181:8181
    volumes:
      - /volume1/docker/media/tautulli/config:/config
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    user: "${PUID}:${PGID}"
    networks: [media]
    depends_on: [plex]
    environment:
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:5056:5055
    volumes:
      - /volume1/docker/media/seerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  # ── Indexer / Management ──────────────────────────────────

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    networks: [media]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49150:9696
    volumes:
      - /volume1/docker/media/prowlarr/config:/config
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    networks: [media]
    depends_on: [prowlarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49152:8989
    volumes:
      - /volume1/docker/media/sonarr/config:/config
      - /volume1/Data:/data
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    networks: [media]
    depends_on: [prowlarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49151:7878
    volumes:
      - /volume1/docker/media/radarr/config:/config
      - /volume1/Data:/data
    restart: unless-stopped

  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    networks: [media]
    depends_on: [sonarr, radarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49153:6767
    volumes:
      - /volume1/docker/media/bazarr/config:/config
      - /volume1/Data:/data
    restart: unless-stopped

  lidarr:
    image: linuxserver/lidarr:latest
    container_name: lidarr
    networks: [media]
    depends_on: [prowlarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49154:8686
    volumes:
      - /volume1/docker/media/lidarr/config:/config
      - /volume1/Data:/data
    restart: unless-stopped

  # ── Download Clients ──────────────────────────────────────

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    networks: [media]
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${NORDVPN_PRIVATE_KEY}
      - SERVER_COUNTRIES=${VPN_COUNTRIES}
      - FIREWALL_INPUT_PORTS=8080
    ports:
      - ${LAN_IP}:49156:49156
      - 6881:6881
      - 6881:6881/udp
    healthcheck:
      test: /gluetun-entrypoint healthcheck
      interval: 10s
      retries: 6
      start_period: 30s
      timeout: 5s
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=49156
      - WEBUI_USERNAME=${QBITTORRENT_USER:-admin}
      - WEBUI_PASSWORD=${QBITTORRENT_PASS}
    volumes:
      - /volume1/docker/media/qbittorrent/config:/config
      - /volume1/docker/media/qbittorrent/custom-cont-init.d:/custom-cont-init.d:ro
      - /volume1/Data/Downloads/Torrents:/downloads
    restart: unless-stopped

  sabnzbd:
    image: linuxserver/sabnzbd:latest
    container_name: sabnzbd
    networks: [media]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:49155:8080
    volumes:
      - /volume1/docker/media/sabnzbd/config:/config
      - /volume1/Data/Downloads/Usenet:/data
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    user: "${PUID}:${PGID}"
    networks: [media]
    depends_on: [sonarr, radarr]
    environment:
      - TZ=${TZ}
      - RECYCLARR_CREATE_CONFIG=true
    volumes:
      - /volume1/docker/media/recyclarr/config:/config
    restart: unless-stopped

  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    networks: [media]
    depends_on: [sonarr, radarr]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
    volumes:
      - /volume1/docker/media/unpackerr/config:/config
      - /volume1/Data:/data
    restart: unless-stopped

networks:
  media:
    driver: bridge
